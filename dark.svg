<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">Premium GitHub Profile Hero Banner — Dark Theme</title>
  <desc id="desc">Animated glassmorphism hero banner with ASCII terminal portrait, typing effects, glowing skills, social icons, particles, scanlines, and shimmer border.</desc>

  <defs>
    <clipPath id="clipCanvas">
      <rect x="0" y="0" width="1180" height="610" rx="34" ry="34"/>
    </clipPath>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="glowA" cx="18%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#312E81" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#312E81" stop-opacity="0"/>
      <animate attributeName="cx" values="18%;24%;18%" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="18%;22%;18%" dur="14s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="glowB" cx="82%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
      <animate attributeName="cx" values="82%;76%;82%" dur="13s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="20%;25%;20%" dur="11s" repeatCount="indefinite"/>
    </radialGradient>

    <radialGradient id="glowC" cx="68%" cy="84%" r="58%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
      <animate attributeName="cx" values="68%;74%;68%" dur="16s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="84%;78%;84%" dur="15s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.18)"/>
    </linearGradient>

    <linearGradient id="asciiGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#A78BFA;#22D3EE" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#10B981;#7C3AED" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#22D3EE;#10B981" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.25 0;0.25 0;-0.25 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.55"/>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#22D3EE" flood-opacity="0.7"/>
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#7C3AED" flood-opacity="0.45"/>
    </filter>

    <filter id="pillGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#22D3EE" flood-opacity="0.45"/>
    </filter>

    <pattern id="noise" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="transparent"/>
      <circle cx="8" cy="12" r="1" fill="white" opacity="0.03"/>
      <circle cx="42" cy="58" r="1" fill="white" opacity="0.025"/>
      <circle cx="95" cy="27" r="1" fill="white" opacity="0.028"/>
      <circle cx="70" cy="93" r="1" fill="white" opacity="0.022"/>
      <circle cx="18" cy="86" r="1" fill="white" opacity="0.03"/>
      <circle cx="110" cy="74" r="1" fill="white" opacity="0.026"/>
      <animateTransform attributeName="patternTransform" type="translate" values="0 0;0 120" dur="8s" repeatCount="indefinite"/>
    </pattern>

    <linearGradient id="scanlineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,238,0)"/>
      <stop offset="50%" stop-color="rgba(34,211,238,0.18)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0)"/>
    </linearGradient>

    <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <mask id="lineReveal1"><rect x="110" y="128" width="0" height="24" fill="white"><animate attributeName="width" begin="0.2s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>
    <mask id="lineReveal2"><rect x="110" y="154" width="0" height="24" fill="white"><animate attributeName="width" begin="0.45s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>
    <mask id="lineReveal3"><rect x="110" y="180" width="0" height="24" fill="white"><animate attributeName="width" begin="0.7s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>
    <mask id="lineReveal4"><rect x="110" y="206" width="0" height="24" fill="white"><animate attributeName="width" begin="0.95s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>
    <mask id="lineReveal5"><rect x="110" y="232" width="0" height="24" fill="white"><animate attributeName="width" begin="1.2s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>
    <mask id="lineReveal6"><rect x="110" y="258" width="0" height="24" fill="white"><animate attributeName="width" begin="1.45s" dur="0.6s" values="0;320" fill="freeze"/></rect></mask>

    <mask id="typingMaskRole">
      <rect x="556" y="228" width="0" height="28" fill="white">
        <animate attributeName="width" values="0;240;0;280;0;320;0;250;0" keyTimes="0;0.18;0.24;0.42;0.48;0.68;0.74;0.92;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </mask>

    <mask id="seq1"><rect x="556" y="276" width="0" height="22" fill="white"><animate attributeName="width" begin="2.4s" dur="0.55s" values="0;470" fill="freeze"/></rect></mask>
    <mask id="seq2"><rect x="556" y="304" width="0" height="22" fill="white"><animate attributeName="width" begin="2.85s" dur="0.55s" values="0;470" fill="freeze"/></rect></mask>
    <mask id="seq3"><rect x="556" y="332" width="0" height="22" fill="white"><animate attributeName="width" begin="3.3s" dur="0.55s" values="0;470" fill="freeze"/></rect></mask>
    <mask id="seq4"><rect x="556" y="360" width="0" height="22" fill="white"><animate attributeName="width" begin="3.75s" dur="0.55s" values="0;470" fill="freeze"/></rect></mask>
    <mask id="seq5"><rect x="556" y="388" width="0" height="22" fill="white"><animate attributeName="width" begin="4.2s" dur="0.55s" values="0;470" fill="freeze"/></rect></mask>
  </defs>

  <g clip-path="url(#clipCanvas)">
    <rect width="1180" height="610" fill="url(#bgGrad)"/>
    <rect width="1180" height="610" fill="url(#glowA)"/>
    <rect width="1180" height="610" fill="url(#glowB)"/>
    <rect width="1180" height="610" fill="url(#glowC)"/>

    <g opacity="0.72">
      <circle cx="92" cy="92" r="2" fill="#A5F3FC"><animate attributeName="cy" values="92;78;92" dur="7s" repeatCount="indefinite"/></circle>
      <circle cx="1120" cy="120" r="1.8" fill="#C4B5FD"><animate attributeName="cy" values="120;138;120" dur="8s" repeatCount="indefinite"/></circle>
      <circle cx="1060" cy="520" r="2.2" fill="#6EE7B7"><animate attributeName="cy" values="520;502;520" dur="9s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="540" r="1.7" fill="#67E8F9"><animate attributeName="cy" values="540;524;540" dur="6.8s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="70" r="1.6" fill="#93C5FD"><animate attributeName="cy" values="70;88;70" dur="7.4s" repeatCount="indefinite"/></circle>
    </g>

    <rect width="1180" height="610" fill="url(#noise)" opacity="0.4"/>

    <rect x="30" y="28" width="1120" height="554" rx="30" fill="rgba(15,23,42,0.64)" stroke="url(#panelStroke)" stroke-width="1.3" filter="url(#panelShadow)"/>

    <rect x="30" y="28" width="1120" height="554" rx="30" fill="none" stroke="rgba(255,255,255,0.12)"/>
    <rect x="-280" y="28" width="260" height="554" fill="url(#shimmerGrad)" opacity="0.35">
      <animate attributeName="x" values="-280;1250" dur="7.8s" repeatCount="indefinite"/>
    </rect>

    <line x1="454" y1="68" x2="454" y2="542" stroke="rgba(148,163,184,0.22)" stroke-width="1"/>

    <g transform="translate(0,0)">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="6s" repeatCount="indefinite"/>
      <rect x="74" y="82" width="340" height="446" rx="22" fill="rgba(2,6,23,0.62)" stroke="rgba(148,163,184,0.28)"/>

      <rect x="74" y="82" width="340" height="22" rx="12" fill="rgba(148,163,184,0.1)"/>
      <circle cx="95" cy="93" r="4" fill="#FB7185"/>
      <circle cx="111" cy="93" r="4" fill="#FBBF24"/>
      <circle cx="127" cy="93" r="4" fill="#34D399"/>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" fill="url(#asciiGrad)" filter="url(#textGlow)">
        <text x="110" y="146" mask="url(#lineReveal1)">⠀⠀⠀⠀⣀⣤⣶⣶⣤⣀</text>
        <text x="110" y="172" mask="url(#lineReveal2)">⠀⠀⠀⣰⣿⣿⣿⣿⣿⣿⣆</text>
        <text x="110" y="198" mask="url(#lineReveal3)">⠀⠀⠀⣿⣿⠟⠉⠉⠻⣿⣿</text>
        <text x="110" y="224" mask="url(#lineReveal4)">⠀⠀⠀⣿⣿⠀⣶⣶⠀⣿⣿</text>
        <text x="110" y="250" mask="url(#lineReveal5)">⠀⠀⠀⢿⣿⣄⠉⠉⣠⣿⡿</text>
        <text x="110" y="276" mask="url(#lineReveal6)">⠀⠀⠀⠀⠻⠿⠿⠿⠟⠁</text>
      </g>

      <rect x="94" y="116" width="300" height="3" fill="url(#scanlineGrad)" opacity="0.75">
        <animate attributeName="y" values="116;506;116" dur="4.2s" repeatCount="indefinite"/>
      </rect>

      <text x="110" y="326" font-family="ui-monospace, monospace" font-size="13" fill="#94A3B8" opacity="0.8">booting neural profile interface...</text>
      <text x="110" y="349" font-family="ui-monospace, monospace" font-size="13" fill="#94A3B8" opacity="0.8">loading identity matrix [██████████] 100%</text>
      <text x="110" y="372" font-family="ui-monospace, monospace" font-size="13" fill="#94A3B8" opacity="0.8">status: online</text>

      <rect x="278" y="356" width="8" height="16" fill="#22D3EE">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g>
      <rect x="520" y="82" width="594" height="446" rx="22" fill="rgba(2,6,23,0.52)" stroke="rgba(148,163,184,0.3)"/>

      <text x="556" y="132" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" fill="#F8FAFC">Hi 👋</text>
      <text x="556" y="178" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="44" font-weight="700" fill="#F8FAFC">I'm yachi2605</text>

      <text x="556" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24" fill="url(#accentGrad)" mask="url(#typingMaskRole)">Frontend Engineer · Full Stack Developer · Open Source Contributor · UI Engineer · AI Enthusiast</text>

      <rect x="902" y="228" width="10" height="24" fill="#22D3EE">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>

      <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" fill="#94A3B8">
        <text x="556" y="294" mask="url(#seq1)">📍 Location: United States</text>
        <text x="556" y="322" mask="url(#seq2)">🎓 Education: Computer Science (self-driven path)</text>
        <text x="556" y="350" mask="url(#seq3)">🔭 Current Focus: Building polished web experiences</text>
        <text x="556" y="378" mask="url(#seq4)">🌐 Portfolio: https://yachi2605.github.io</text>
        <text x="556" y="406" mask="url(#seq5)">✉️ Email: yachi2605@users.noreply.github.com</text>
      </g>

      <text x="556" y="446" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#CBD5E1" letter-spacing="1">SKILLS</text>

      <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#E2E8F0" filter="url(#pillGlow)">
        <g transform="translate(556,458)"><rect width="74" height="28" rx="14" fill="rgba(124,58,237,0.2)" stroke="rgba(34,211,238,0.5)"/><text x="15" y="19">React</text><animateTransform attributeName="transform" type="scale" values="1 1;1.04 1.04;1 1" dur="5s" repeatCount="indefinite"/></g>
        <g transform="translate(638,458)"><rect width="80" height="28" rx="14" fill="rgba(34,211,238,0.18)" stroke="rgba(16,185,129,0.55)"/><text x="13" y="19">Next.js</text><animateTransform attributeName="transform" type="scale" values="1 1;1.05 1.05;1 1" dur="5.4s" repeatCount="indefinite"/></g>
        <g transform="translate(726,458)"><rect width="80" height="28" rx="14" fill="rgba(16,185,129,0.18)" stroke="rgba(34,211,238,0.55)"/><text x="12" y="19">Node.js</text><animateTransform attributeName="transform" type="scale" values="1 1;1.045 1.045;1 1" dur="6s" repeatCount="indefinite"/></g>
        <g transform="translate(814,458)"><rect width="96" height="28" rx="14" fill="rgba(59,130,246,0.18)" stroke="rgba(167,139,250,0.55)"/><text x="10" y="19">TypeScript</text><animateTransform attributeName="transform" type="scale" values="1 1;1.04 1.04;1 1" dur="5.8s" repeatCount="indefinite"/></g>
        <g transform="translate(918,458)"><rect width="82" height="28" rx="14" fill="rgba(45,212,191,0.16)" stroke="rgba(34,211,238,0.45)"/><text x="10" y="19">Tailwind</text><animateTransform attributeName="transform" type="scale" values="1 1;1.05 1.05;1 1" dur="5.6s" repeatCount="indefinite"/></g>

        <g transform="translate(556,492)"><rect width="76" height="28" rx="14" fill="rgba(14,165,233,0.18)" stroke="rgba(125,211,252,0.5)"/><text x="15" y="19">Python</text><animateTransform attributeName="transform" type="scale" values="1 1;1.04 1.04;1 1" dur="5.9s" repeatCount="indefinite"/></g>
        <g transform="translate(640,492)"><rect width="76" height="28" rx="14" fill="rgba(56,189,248,0.16)" stroke="rgba(34,211,238,0.5)"/><text x="16" y="19">Docker</text><animateTransform attributeName="transform" type="scale" values="1 1;1.045 1.045;1 1" dur="6.2s" repeatCount="indefinite"/></g>
        <g transform="translate(724,492)"><rect width="86" height="28" rx="14" fill="rgba(20,184,166,0.16)" stroke="rgba(52,211,153,0.5)"/><text x="12" y="19">Postgres</text><animateTransform attributeName="transform" type="scale" values="1 1;1.04 1.04;1 1" dur="6.1s" repeatCount="indefinite"/></g>
        <g transform="translate(818,492)"><rect width="60" height="28" rx="14" fill="rgba(14,116,144,0.2)" stroke="rgba(34,211,238,0.52)"/><text x="16" y="19">AWS</text><animateTransform attributeName="transform" type="scale" values="1 1;1.05 1.05;1 1" dur="6.3s" repeatCount="indefinite"/></g>
        <g transform="translate(886,492)"><rect width="56" height="28" rx="14" fill="rgba(99,102,241,0.18)" stroke="rgba(129,140,248,0.52)"/><text x="18" y="19">Git</text><animateTransform attributeName="transform" type="scale" values="1 1;1.045 1.045;1 1" dur="5.7s" repeatCount="indefinite"/></g>
        <g transform="translate(950,492)"><rect width="72" height="28" rx="14" fill="rgba(167,139,250,0.16)" stroke="rgba(196,181,253,0.52)"/><text x="17" y="19">Figma</text><animateTransform attributeName="transform" type="scale" values="1 1;1.05 1.05;1 1" dur="6.4s" repeatCount="indefinite"/></g>
      </g>

      <g transform="translate(556,538)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#CBD5E1">
        <g transform="translate(0,0)">
          <circle cx="16" cy="-7" r="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.45)"/>
          <text x="34" y="-2">GitHub</text>
        </g>
        <g transform="translate(130,0)">
          <circle cx="16" cy="-7" r="12" fill="rgba(124,58,237,0.12)" stroke="rgba(167,139,250,0.45)"/>
          <text x="34" y="-2">LinkedIn</text>
        </g>
        <g transform="translate(290,0)">
          <circle cx="16" cy="-7" r="12" fill="rgba(16,185,129,0.12)" stroke="rgba(52,211,153,0.45)"/>
          <text x="34" y="-2">Twitter</text>
        </g>
        <g transform="translate(430,0)">
          <circle cx="16" cy="-7" r="12" fill="rgba(59,130,246,0.12)" stroke="rgba(125,211,252,0.45)"/>
          <text x="34" y="-2">Portfolio</text>
        </g>
      </g>
    </g>
  </g>
</svg>
